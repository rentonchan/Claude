name: Claude Code

on:
  pull_request:
  issue_comment:

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
