name: Morning Brief

on:
  schedule:
    - cron: '3 23 * * *'  # 7:03am HKT daily (HKT = UTC+8)
  workflow_dispatch:       # manual trigger from GitHub UI

jobs:
  run-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: 'Ali abdaal claude code youtube/requirements.txt'

      - name: Install dependencies
        working-directory: 'Ali abdaal claude code youtube'
        run: pip install -r requirements.txt

      - name: Restore Google OAuth token
        working-directory: 'Ali abdaal claude code youtube'
        env:
          GOOGLE_TOKEN_B64: ${{ secrets.GOOGLE_TOKEN_B64 }}
        run: python tools/restore_token.py

      - name: Run morning scripts
        working-directory: 'Ali abdaal claude code youtube'
        env:
          NOTION_TOKEN:      ${{ secrets.NOTION_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "=== $(date) ==="
          echo "[1/5] Daily Brief..."     && python tools/daily_brief.py
          echo "[2/5] Weekly View..."     && python tools/update_weekly_view.py
          echo "[3/5] News Radar..."      && python tools/fetch_news.py
          echo "[4/5] Email Digest..."    && python tools/fetch_email_actions.py
          echo "[5/5] Archive briefs..."  && python tools/archive_old_briefs.py
          echo "=== Done ==="

  reset-habits:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: 'Ali abdaal claude code youtube'
        run: pip install -r requirements.txt

      - name: Restore Google OAuth token
        working-directory: 'Ali abdaal claude code youtube'
        env:
          GOOGLE_TOKEN_B64: ${{ secrets.GOOGLE_TOKEN_B64 }}
        run: python tools/restore_token.py

      - name: Reset weekly habits
        working-directory: 'Ali abdaal claude code youtube'
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python tools/reset_habits.py
